# Command one-line descriptions (en-US). Edit here; do not embed i18n in command classes.
# Used by: help list, search (locale C), AICO manifest (via app.default_locale) when set to en-US.
commands:
  help:
    description: "List available commands for the current caller, or show detailed help for one command."
  stats:
    description: "Show system statistics"
    title: "System Statistics"
    error: "Failed to get system stats: {error}"
  version:
    description: "Show version information"
  quit:
    description: "Exit the system"
    goodbye: "Goodbye!"
  time:
    description: "Show current time"
    format: "Current time: {time}"
  whoami:
    description: "Show current user"
    current_user: "Current user: {username}"
  who:
    description: "List online users and sessions"
    title: "CampusWorld Online Users"
    header:
      player: "Player"
      location: "Location"
      idle: "Idle"
      duration: "Duration"
    footer: "{n} users online ({m} active sessions)."
    error:
      unavailable: "Online user list unavailable."
      no_sessions: "No users online."
    warning:
      location_unavailable: "Location information unavailable."
  type:
    description: "List system-registered node types"
    title: "Node Types"
    footer:
      preview: "Showing {shown} of {total}. Pass -a to see all."
      all: "{total} active types."
    error:
      no_session: "Node type list unavailable (no DB session)."
      empty: "No active node types."
  look:
    description: "Look at the current room or inspect a thing"
  go:
    description: "Move in a direction (n/s/e/w/…)"
  enter:
    description: "Enter a world or follow an enter exit"
  leave:
    description: "Leave the current world and return to the Singularity Room"
  notice:
    description: "Manage system bulletins (publish/edit/archive/list)"
  world:
    description: "World package management (list/install/uninstall/reload/status/validate/repair/content/bridge)"
  create:
    description: "Create an object: create ClassName = {args}"
  create_info:
    description: "Show model details for the builder"
  find:
    description: >-
      Find nodes. Flags AND-compose: -n name, -des desc, -t type, -loc id, -l N, -a (capped).
      Shortcuts: #<id>, *<account>. Returns data.results [{id,type_code,name,location_id,description}] + total/next_offset. Not semantic.
  describe:
    description: "Show a single node's details (type, name, description, attrs, edges)."
  space:
    description: "SPACE node summary by id (appearance, occupants, devices, relations)"
    usage:
      line: "space -t | space -i <node_id>"
    section:
      title:
        "1": "Space description:"
        "2": "Space occupants:"
        "3": "Space devices:"
        "4": "Space relations:"
    table:
      header:
        id: "id"
        name: "name"
        direction: "direction"
        type_code: "type_code"
        status: "status"
        description: "description"
    s1:
      name: "name: {n}"
      local_name: "also known: {n}"
      tagline: "tagline: {n}"
      short_desc: "short: {n}"
      floor_name: "floor: {n}"
      exit: "exit {dir}: {name}"
    type_list:
      title: "SPACE type_code"
      empty: "(no SPACE types)"
      footer: "total: {n}"
    empty:
      row: "(none)"
    error:
      no_session: "requires an active DB session"
      not_found: "node not found or not a space"
      bad_i: "-i requires a node id"
      bad_id: "node id must be a positive integer"
      unknown_flag: "unknown flag: {token}"
    flags:
      bad_combo: "cannot combine -t with -i"
  primer:
    description: >-
      System primer — prefer `primer <section>` (e.g. primer ontology) to save tokens;
      bare `primer` returns the full nine-section document.
  aico:
    description: "Talk to AICO"
  agent:
    description: >-
      Agent directory: list / status / tool / show
    list:
      empty: |-
        agent list: no active npc_agent nodes found.
        Expected: nodes with type_code=npc_agent, is_active=true
      header:
        id: "id"
        name: "name"
        status: "status"
        agent_node_id: "agent_node_id"
      footer: "(total={n})"
      hint: "Example: agent status <id>"
    status:
      usage: "usage: agent status <id>"
    status_value:
      unavailable: "unavailable"
      idle: "idle"
      working: "working"
    tool:
      title: "Agent tools"
      header:
        id: "id"
        name: "name"
        status: "status"
        n_tools: "n"
        tools: "tools"
      footer:
        total: "(total={n})"
      empty: "No agents registered."
      tools_empty: "(none)"
      usage:
        add: "agent tool add <id> <tool> [<tool>...]"
        del: "agent tool del <id> <tool> [<tool>...]"
      summary:
        add_success: "add {sid} {tools} succeeded (allowlist updated)."
        add_mixed: "add {sid} {added} succeeded. Already in allowlist: {unchanged}."
        add_noop: "No change: {tools} already in the allowlist for {sid}."
        del_success: "del {sid} {tools} succeeded (allowlist updated)."
        del_mixed: "del {sid} {removed} succeeded. Not in allowlist: {unchanged}."
        del_noop: "No change: {tools} not in the allowlist for {sid}."
      error:
        no_session: "database session required"
        forbidden: "Permission denied for agent tool {action}"
        unknown_tool: "unknown tool: {name}"
        misordered_add_del: >-
          Subcommand {second} must come first after agent tool. Use: {expected}
          (This line was parsed as: query agent '{first}' only; '{second}' and the rest were ignored.)
    show:
      usage: "usage: agent show <id>"
      description: "Capability summary for one agent by id"
    error:
      no_session: "database session required"
  north:
    description: "Move north"
  south:
    description: "Move south"
  east:
    description: "Move east"
  west:
    description: "Move west"
  northeast:
    description: "Move northeast"
  northwest:
    description: "Move northwest"
  southeast:
    description: "Move southeast"
  southwest:
    description: "Move southwest"
  up:
    description: "Move up"
  down:
    description: "Move down"
  in:
    description: "Move in"
  out:
    description: "Move out"
  task:
    description: "Task command family (create / publish / claim / assign / complete / list / show / pool ...)"
    usage:
      root: "task <subcommand> [args]; available: create / list / show / claim / assign / publish / complete / pool"
      create: "task create --title <T> [--workflow <key>] [--to-pool <pool_key>] [--priority <p>] [--visibility <v>] [--idempotency-key <k>]"
      claim: "task claim <id> [--idempotency-key <k>]"
      assign: "task assign <id> --to <principal_id> [--kind user|agent|group] [--idempotency-key <k>]"
      publish: "task publish <id> --to-pool <pool_key> [--idempotency-key <k>]"
      complete: "task complete <id> [--idempotency-key <k>]"
      list: "task list [--mine|--pool <key>|--assigned] [--limit N] [--offset O]"
      show: "task show <id>"
      pool: "task pool <list|show|create|update|disable|enable> [args]"
      pool_list: "task pool list [--scope <prefix>] [--include-inactive]"
      pool_show: "task pool show <key>"
      pool_create: "task pool create <key> --display-name <N> [--workflow <k>:<v>] [--visibility <v>] [--priority <p>] [--description <D>]"
      pool_update: "task pool update <key> [--display-name <N>] [--description <D>] [--visibility <v>] [--priority <p>]"
      pool_disable: "task pool disable <key>"
      pool_enable: "task pool enable <key>"
    create:
      success: "Task created: #{task_id} state={to_state} version={state_version}"
    publish:
      success: "Task published: #{task_id} pool={pool_key} state={to_state}"
    claim:
      success: "Task claimed: #{task_id} state={to_state} version={state_version}"
    assign:
      success: "Task assigned: #{task_id} state={to_state} version={state_version}"
    complete:
      success: "Task completed: #{task_id} state={to_state} version={state_version}"
    list:
      header: "Task list (total={total}, rows {offset}–{end})"
      empty: "No tasks match."
      row: "#{id}  state={state}  pool={pool_key}  priority={priority}  title={title}"
    show:
      title: "Task #{id}"
    pool:
      list:
        header: "Task pools (total={total})"
        empty: "No active task pools."
        row: "{key}  active={is_active}  visibility={visibility}  priority={priority}  workflow={workflow}"
      show:
        title: "Task pool {key}"
      create:
        success: "Task pool created: {key} (id={id})"
      update:
        success: "Task pool updated: {key}"
      disable:
        success: "Task pool disabled: {key}"
      enable:
        success: "Task pool enabled: {key}"
    error:
      generic: "Task system error: {detail}"
      forbidden: "Permission denied for task operation: {detail}"
      not_found: "Task not found: #{task_id}"
      invalid_event: "Workflow does not allow this event: {detail}"
      version_stale: "State version is stale; refresh and retry: {detail}"
      already_claimed: "Task already claimed: {detail}"
      role_required: "Required role missing: {detail}"
      precondition_failed: "Precondition failed: {detail}"
      workflow_not_found: "Workflow definition not found: {detail}"
      workflow_inactive: "Workflow definition is inactive: {detail}"
      pool_not_found: "Task pool not found: {detail}"
      pool_inactive: "Task pool is inactive: {detail}"
      publish_denied: "Publish denied by pool ACL: {detail}"
      consume_denied: "Claim denied by pool ACL: {detail}"
      children_not_terminal: "Child tasks not yet terminal: {detail}"
      cycle_detected: "Task dependency would form a cycle: {detail}"
      selector_bounds_exceeded: "Selector bounds exceeded: {detail}"
      empty_selector: "Selector is empty: {detail}"
      unknown_trait_class: "Unknown trait_class: {detail}"
      unknown_trait_mask: "Unknown trait_mask name: {detail}"
      expansion_backpressure: "expand backpressure: {detail}"
      unauthenticated: "Caller is not authenticated via the account system; task system refuses to act: {detail}"
      visibility_unsupported: "Visibility level not supported (allowed: private, explicit, pool_open): {detail}"
