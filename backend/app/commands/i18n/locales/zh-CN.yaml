# 命令一行简介（zh-CN）。在此统一定稿；避免在 Python 中硬编码多语言长句。
# 用途：help 列表、按语言搜索、与 app.default_locale 对齐的 graph/AICO 文案等。
commands:
  help:
    description: "列出当前可用命令，或显示某条命令的详细帮助。"
  stats:
    description: "显示系统资源与运行统计"
    title: "系统统计"
    error: "获取系统统计失败：{error}"
  version:
    description: "显示版本与运行环境信息"
  quit:
    description: "退出会话/连接"
    goodbye: "再见！"
  time:
    description: "显示当前时间"
    format: "当前时间：{time}"
  whoami:
    description: "显示当前用户信息"
    current_user: "当前用户：{username}"
  who:
    description: "显示在线用户与活跃会话"
    title: "CampusWorld 在线用户"
    header:
      player: "用户"
      location: "位置"
      idle: "空闲"
      duration: "时长"
    footer: "{n} 位用户在线（{m} 个活跃会话）。"
    error:
      unavailable: "在线用户列表不可用。"
      no_sessions: "当前无在线用户。"
    warning:
      location_unavailable: "位置信息暂不可用。"
  type:
    description: "列出系统注册的节点类型"
    title: "节点类型"
    footer:
      preview: "共 {total} 个，已显示前 {shown} 个；使用 -a 查看全部。"
      all: "共 {total} 个 active 类型。"
    error:
      no_session: "节点类型列表不可用（缺少数据库会话）。"
      empty: "暂无 active 节点类型。"
  look:
    description: "查看当前环境或指定物品/对象"
  go:
    description: "向指定方向移动"
  enter:
    description: "进入指定世界或沿 enter 出口离开"
  leave:
    description: "离开当前世界，回到奇点屋"
  notice:
    description: "管理系统公告（发布/编辑/归档/列表）"
  world:
    description: "世界包管理（列表/安装/卸载/重载/校验等）"
  create:
    description: "按模型创建对象：create 类名 = {参数}"
  create_info:
    description: "查看可创建模型的元数据与字段"
  find:
    description: "按条件查找节点（非语义检索）"
  describe:
    description: "查看单个节点详情（类型、属性、关系摘要）"
  space:
    description: "按节点 id 查询空间（SPACE）四段摘要：环境、人物、设备、关系"
    usage:
      line: "space -t | space -i <node_id>"
    section:
      title:
        "1": "空间描述："
        "2": "空间人物："
        "3": "空间设备："
        "4": "空间关系："
    table:
      header:
        id: "id"
        name: "name"
        direction: "direction"
        type_code: "type_code"
        status: "status"
        description: "description"
    s1:
      name: "名称：{n}"
      local_name: "本地名：{n}"
      tagline: "标语：{n}"
      short_desc: "短描述：{n}"
      floor_name: "楼层名：{n}"
      exit: "出口 {dir}：{name}"
    type_list:
      title: "SPACE 类型 type_code"
      empty: "（无 SPACE 类型）"
      footer: "共 {n} 个"
    empty:
      row: "（无）"
    error:
      no_session: "需要数据库会话"
      not_found: "无此节点或不是空间"
      bad_i: "-i 需要节点 id"
      bad_id: "节点 id 须为正整数"
      unknown_flag: "未知参数：{token}"
    flags:
      bad_combo: "不能同时使用 -t 与 -i"
  primer:
    description: "系统primer信息（建议用章节节省输出）"
  agent_capabilities:
    description: "按service_id查询 Agent 能力摘要"
  agent_tools:
    description: 列出Agent可使用工具列表。
    title: "Agent 工具"
    header:
      service_id: "service_id"
      name: "名称"
      status: "状态"
      n_tools: "数"
      tools: "工具"
    footer:
      total: "（共 {n} 个）"
    empty: "暂无已注册 Agent。"
    tools_empty: "（无）"
    usage:
      add: "agent_tools add <service_id> <tool> [<tool>...]"
      del: "agent_tools del <service_id> <tool> [<tool>...]"
    summary:
      add_success: "add {sid} {tools} 成功（已更新白名单）。"
      add_mixed: "add {sid} {added} 成功；{unchanged} 本已在白名单中，未改。"
      add_noop: "无变更：{tools} 已在 {sid} 白名单中。"
      del_success: "del {sid} {tools} 成功（已更新白名单）。"
      del_mixed: "del {sid} {removed} 成功；{unchanged} 本不在白名单中，未改。"
      del_noop: "无变更：{tools} 本不在 {sid} 白名单中。"
    error:
      no_session: "缺少数据库会话"
      forbidden: "无权限执行 agent_tools {action}"
      unknown_tool: "未知工具：{name}"
      misordered_add_del: 子命令 {second} 须紧跟在 agent_tools 之后。请使用：{expected}
  aico:
    description: "与AICO对话"
  agent:
    description: "查询Agent信息(list / status / nlp)"
    list:
      empty: |-
        agent list：当前无可见的活跃 npc_agent 节点。
        预期：图节点 type_code=npc_agent 且 is_active=true
      header:
        service_id: "service_id"
        name: "名称"
        status: "状态"
        id: "节点ID"
      footer: "（共 {n} 个）"
      hint: "单实例：agent status <service_id>"
    status_value:
      unavailable: "不可用"
      idle: "空闲"
      working: "工作中"
    error:
      no_session: "需要数据库会话"
  north:
    description: "向北移动"
  south:
    description: "向南移动"
  east:
    description: "向东移动"
  west:
    description: "向西移动"
  northeast:
    description: "向东北移动"
  northwest:
    description: "向西北移动"
  southeast:
    description: "向东南移动"
  southwest:
    description: "向西南移动"
  up:
    description: "向上移动"
  down:
    description: "向下移动"
  in:
    description: "向内移动"
  out:
    description: "向外/离开方向移动"
  task:
    description: "任务命令（create / publish / claim / assign / complete / list / show / pool ...）"
    usage:
      root: "task <子命令> [参数]；可用：create / list / show / claim / assign / publish / complete / pool"
      create: "task create --title <T> [--workflow <key>] [--to-pool <pool_key>] [--priority <p>] [--visibility <v>] [--idempotency-key <k>]"
      claim: "task claim <id> [--idempotency-key <k>]"
      assign: "task assign <id> --to <principal_id> [--kind user|agent|group] [--idempotency-key <k>]"
      publish: "task publish <id> --to-pool <pool_key> [--idempotency-key <k>]"
      complete: "task complete <id> [--idempotency-key <k>]"
      list: "task list [--mine|--pool <key>|--assigned] [--limit N] [--offset O]"
      show: "task show <id>"
      pool: "task pool <list|show|create|update|disable|enable> [args]"
      pool_list: "task pool list [--scope <prefix>] [--include-inactive]"
      pool_show: "task pool show <key>"
      pool_create: "task pool create <key> --display-name <N> [--workflow <k>:<v>] [--visibility <v>] [--priority <p>] [--description <D>]"
      pool_update: "task pool update <key> [--display-name <N>] [--description <D>] [--visibility <v>] [--priority <p>]"
      pool_disable: "task pool disable <key>"
      pool_enable: "task pool enable <key>"
    create:
      success: "任务已创建：#{task_id} 状态={to_state} 版本={state_version}"
    publish:
      success: "任务已发布到池：#{task_id} 池={pool_key} 状态={to_state}"
    claim:
      success: "任务已认领：#{task_id} 状态={to_state} 版本={state_version}"
    assign:
      success: "任务已派发：#{task_id} 状态={to_state} 版本={state_version}"
    complete:
      success: "任务已完成：#{task_id} 状态={to_state} 版本={state_version}"
    list:
      header: "任务清单（共 {total} 条，第 {offset}–{end} 条）"
      empty: "未匹配任何任务。"
      row: "#{id}  state={state}  pool={pool_key}  priority={priority}  title={title}"
    show:
      title: "任务 #{id}"
    pool:
      list:
        header: "任务池清单（共 {total} 个）"
        empty: "暂无激活的任务池。"
        row: "{key}  active={is_active}  visibility={visibility}  priority={priority}  workflow={workflow}"
      show:
        title: "任务池 {key}"
      create:
        success: "任务池已创建：{key} (id={id})"
      update:
        success: "任务池已更新：{key}"
      disable:
        success: "任务池已停用：{key}"
      enable:
        success: "任务池已启用：{key}"
    error:
      generic: "任务系统错误：{detail}"
      forbidden: "无权限执行任务操作：{detail}"
      not_found: "未找到任务 #{task_id}"
      invalid_event: "工作流不允许该事件：{detail}"
      version_stale: "状态版本已变更，请刷新后重试：{detail}"
      already_claimed: "任务已被认领：{detail}"
      role_required: "缺少所需角色：{detail}"
      precondition_failed: "前置条件未满足：{detail}"
      workflow_not_found: "工作流定义未找到：{detail}"
      workflow_inactive: "工作流定义已停用：{detail}"
      pool_not_found: "任务池未找到：{detail}"
      pool_inactive: "任务池已停用：{detail}"
      publish_denied: "发布被池 ACL 拒绝：{detail}"
      consume_denied: "认领被池 ACL 拒绝：{detail}"
      children_not_terminal: "子任务尚未全部终态：{detail}"
      cycle_detected: "任务依赖关系会形成环：{detail}"
      selector_bounds_exceeded: "选择器越界：{detail}"
      empty_selector: "选择器为空：{detail}"
      unknown_trait_class: "未知 trait_class：{detail}"
      unknown_trait_mask: "未知 trait_mask 名：{detail}"
      expansion_backpressure: "expand 背压：{detail}"
      unauthenticated: "调用方未通过账号系统认证，任务系统拒绝处理：{detail}"
      visibility_unsupported: "不支持该可见性等级（仅支持 private / explicit / pool_open）：{detail}"
