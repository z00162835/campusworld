        count: 1
  - id: manager_office
    match:
      require_tags_any: [function:manager]
    add_templates:
      - template_id: furniture_manager
        count: 1
  - id: pantry
    match:
      require_tags_any: [space:pantry]
    add_templates:
      - template_id: furniture_pantry
        count: 1
  - id: dorm
    match:
      require_tags_any: [space:dorm]
    add_templates:
      - template_id: furniture_dorm
        count: 1
  - id: lab
    match:
      require_tags_any: [space:lab]
    add_templates:
