# Placement rules for entity_item_generate (ordered furniture_rules: first match wins).
version: 1
device_rules:
  - id: base_ap_light
    match: {}
    add_templates:
      - template_id: wifi_ap
        count: 1
      - template_id: lighting_fixture
        count: 1
  - id: meeting_display
    match:
      require_tags_any: [space:meeting]
    add_templates:
      - template_id: av_display
        count: 1

furniture_rules:
  - id: meeting_seating
    match:
      require_tags_any: [space:meeting]
    add_templates:
