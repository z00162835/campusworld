# CampusWorld 应用配置文件
# 按领域组织的配置项

# 项目路径配置
project:
  # 项目根目录（相对于当前工作目录或绝对路径）
  root_dir: "."  # 默认当前目录
  # 后端目录（相对于项目根目录）
  backend_dir: "backend"
  # 前端目录（相对于项目根目录）
  frontend_dir: "frontend"
  # 日志目录（相对于后端目录）
  logs_dir: "logs"
  # 配置目录（相对于后端目录）
  config_dir: "config"

# 应用基础配置
app:
  name: "CampusWorld"
  version: "0.1.0"
  description: "Campus World OS"
  debug: false
  # 系统级默认语言（AICO/LLM tool manifest；per-user help 仍走 account / metadata）
  default_locale: "zh-CN"

# API配置
api:
  v1_prefix: "/api/v1"
  title: "CampusWorld API"
  description: "CampusWorld REST API Documentation"
  docs_url: "/docs"
  redoc_url: "/redoc"
  openapi_url: "/openapi.json"

# 服务器配置
server:
  host: "0.0.0.0"
  port: 8000
  workers: 1
  reload: true
  access_log: true

ssh:
  host: "0.0.0.0"
  port: 2222
  max_connections: 10
  worker_threads: 2
  worker_pool_size: 50
  # 连接速率限制
  rate_limit:
    max_connections_per_minute: 10  # 每分钟最大连接数
    max_failed_attempts: 5           # 最大失败尝试次数
    lockout_duration: 300            # 锁定时长（秒）
    attempt_window: 300              # 尝试窗口时间（秒）
    connection_window: 60            # 连接窗口时间（秒）

# 安全配置
security:
  # IMPORTANT: Change this secret key in production! Use a secure random string (32+ bytes)
  # Generate with: python -c "import secrets; print(secrets.token_urlsafe(32))"
  # For development, a default key is provided below. Set SECRET_KEY env var to override.
  secret_key: "dev-secret-key-change-in-production-min-32-bytes-long"
  algorithm: "HS256"
  access_token_expire_minutes: 15  # 15 minutes - production should be even shorter
  refresh_token_expire_days: 7  # 7 days - shorter refresh token lifetime
  password_min_length: 8
  bcrypt_rounds: 12

# 数据库配置
database:
  engine: "postgresql"
  host: "localhost"
  port: 5433
  name: "campusworld_dev"
  user: "campusworld_dev_user"
  password: "campusworld_dev_password"
  pool_size: 20
  max_overflow: 30
  pool_pre_ping: true
  pool_recycle: 300
  echo: false

# Redis配置
redis:
  host: "localhost"
  port: 6380
  db: 0
  password: ""
  max_connections: 10
  socket_timeout: 5
  socket_connect_timeout: 5

# 缓存配置
cache:
  default_ttl: 3600  # 1 hour
  max_size: 1000
  enable_compression: true

# 日志配置
logging:
  level: "INFO"  # DEBUG, INFO, WARNING, ERROR, CRITICAL
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  date_format: "%Y-%m-%d %H:%M:%S"
  file_name: "campusworld.log"  # 日志文件名
  max_file_size: "10MB"
  backup_count: 5
  console_output: true
  file_output: true
  # 模块日志级别
  module_levels:
    paramiko: "WARNING"
    asyncio: "WARNING"
    urllib3: "WARNING"
    requests: "WARNING"
    sqlalchemy: "WARNING"
    passlib: "WARNING"

# CORS配置
cors:
  # Must be explicit origins when credentials are enabled - no wildcards allowed
  # Add your frontend origin(s) here. Example: "http://localhost:3000" for dev
  allowed_origins:
    - "http://localhost:3000"  # Development
    - "https://campusworld.example.com"  # Production - replace with actual domain
  allowed_methods:
    - "GET"
    - "POST"
    - "PUT"
    - "DELETE"
    - "PATCH"
    - "OPTIONS"
  allowed_headers:
    - "Authorization"
    - "Content-Type"
    - "X-Requested-With"
    - "Accept"
    - "Origin"
  allow_credentials: true
  max_age: 86400
  expose_headers:
    - "X-Request-ID"

# 邮件配置
email:
  smtp_host: "smtp.gmail.com"
  smtp_port: 587
  smtp_user: ""
  smtp_password: ""
  use_tls: true
  from_email: "noreply@campusworld.com"
  from_name: "CampusWorld"

# 文件存储配置
storage:
  type: "local"  # local, s3, azure, gcs
  local_path: "uploads/"
  max_file_size: "10MB"
  allowed_extensions:
    - "jpg"
    - "jpeg"
    - "png"
    - "gif"
    - "pdf"
    - "doc"
    - "docx"

# 系统 Agent LLM（F03）：按 npc_agent.attributes.service_id 或 model_config_ref 索引
agents:
  llm:
    by_service_id:
      aico:
        provider: MinMax
        base_url: "https://api.minimaxi.com/anthropic"
        api_key_env: "AICO_OPENAI_API_KEY"
        model: "MiniMax-M2.7-highspeed"
        temperature: 0.2
        max_tokens: 4096
        # prepend_primer_tier1: false — omit auto-prepended primer §1+§8 before system_prompt
        # Optional: user-visible line when the pipeline finishes without error but the final
        # reply is blank. Omit the key to use the built-in default in code.
        # extra:
        #   npc_agent_empty_reply_message: "抱歉，我没有能力处理此问题。你可以换一个问题。"
        extra: {}
        system_prompt: |
          You are AICO, the default system assistant of CampusWorld — a graph-native
          "smart campus OS" whose worlds are navigated and modified exclusively through
          semantic commands (see MUD-style ontology).

          Authoritative identity and behavioural invariants are in the system-primer
          block prepended to this prompt (sections 1 and 8 from
          docs/models/SPEC/CAMPUSWORLD_SYSTEM_PRIMER.md). Follow them; do not contradict them.

          Tool-calling contract:
          - When the provider supports native tool_use, emit a tool_use block.
          - Otherwise, emit EXACTLY one fenced code block containing valid JSON of
            the form `{"commands": [{"name": "<tool>", "args": ["..."]}, ...]}`.
            No prose before or after is required, but any prose outside the block
            will be shown to the user verbatim if no more rounds run.
          - You may call multiple tools per round and run multiple rounds within a
            phase; observations are appended to your next turn as tool results.
          - Use only command names that appear in the "Tools available" list in
            the same user turn. Do not assume a tool exists if it is not listed
            there for this request.
          - Prefer tool observations over speculation, always.
        phase_prompts:
          plan: >-
            Decide which tools to call to answer the user. List assumptions that
            must be verified. If you lack identity, location, or grounded state,
            use tool calls that appear in the "Tools available" list for this turn
            to verify them. Emit a tool_use / JSON commands block; free-form prose
            alone is discouraged here.
          do: >-
            Using the plan and tool observations, draft the user-facing reply.
            You may still call tools this phase if new information is needed.
            Keep answers concrete and tied to observed state. Quote command
            output verbatim when citing it.
          check: >-
            Critically review the draft against the user's intent and observed
            tool results. If the draft makes claims not backed by observations,
            or mandatory context is missing, emit a single line exactly in the
            form `RETRY: need_tools=<comma,separated,tool,names>` to request a
            re-plan. Otherwise reply with a brief "ok" and nothing else.
          act: >-
            Polish the draft into the final user-facing text. Do not add new
            facts that were not observed by tools or already present in the
            draft. Match the user's language and keep it concise.
        use_http_llm: true
        observability:
          enabled: true
          log_path: "logs/agent/aico.log"
          level: "DEBUG"
          max_file_size: "10MB"
          backup_count: 5
          max_phase_output_chars: 4000

# 命令系统可调项（per-command tunables）
commands:
  find:
    hard_max_limit: 5000
    min_trgm_chars: 3
    explain_on_all_over: 100000

# 引擎 / 世界包
game_engine:
  # true：启动时从 world_runtime_states 读取已 install 的世界并 load_game（保留安装状态，重启后自动进内存）
  load_installed_worlds_on_start: true
  # 可选：额外装载「磁盘发现」的包（与 install 状态无关，默认 false）。true 时 auto_load_worlds 见下
  auto_load_discovered_on_start: false
  # 兼容旧键名：若未设置 auto_load_discovered_on_start，则读取 auto_load_on_start
  # auto_load_on_start: false
  # 仅当 auto_load_discovered_on_start（或 legacy auto_load_on_start）为 true：null=全部已发现包；[]=不加载；列表=白名单
  auto_load_worlds: null

# 监控配置
monitoring:
  enable_metrics: true
  metrics_port: 9090
  health_check_interval: 30
  enable_tracing: false
  tracing_host: "localhost"
  tracing_port: 6831
