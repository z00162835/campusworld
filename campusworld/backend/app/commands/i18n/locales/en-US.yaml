# Command one-line descriptions (en-US). Edit here; do not embed i18n in command classes.
# Used by: help list, search (locale C), AICO manifest (via app.default_locale) when set to en-US.
commands:
  help:
    description: "List available commands for the current caller, or show detailed help for one command."
  stats:
    description: "Show system statistics"
    title: "System Statistics"
    error: "Failed to get system stats: {error}"
  version:
    description: "Show version information"
  quit:
    description: "Exit the system"
    goodbye: "Goodbye!"
  time:
    description: "Show current time"
    format: "Current time: {time}"
  whoami:
    description: "Show current user"
    current_user: "Current user: {username}"
  who:
    description: "List online users and sessions"
    title: "CampusWorld Online Users"
    header:
      player: "Player"
      location: "Location"
      idle: "Idle"
      duration: "Duration"
    footer: "{n} users online ({m} active sessions)."
    error:
      unavailable: "Online user list unavailable."
      no_sessions: "No users online."
    warning:
      location_unavailable: "Location information unavailable."
  type:
    description: "List system-registered node types"
    title: "Node Types"
    footer:
      preview: "Showing {shown} of {total}. Pass -a to see all."
      all: "{total} active types."
    error:
      no_session: "Node type list unavailable (no DB session)."
      empty: "No active node types."
  look:
    description: "Look at the current room or inspect a thing"
  go:
    description: "Move in a direction (n/s/e/w/…)"
  enter:
    description: "Enter a world or follow an enter exit"
  leave:
    description: "Leave the current world and return to the Singularity Room"
  notice:
    description: "Manage system bulletins (publish, edit, archive, list)"
  world:
    description: "World package management (list, install, uninstall, reload, status, …)"
  create:
    description: "Create an object: create ClassName = {args}"
  create_info:
    description: "Show model details for the builder"
  find:
    description: >-
      Find nodes. Flags AND-compose: -n name, -des desc, -t type, -loc id, -l N, -a (capped).
      Shortcuts: #<id>, *<account>. Returns data.results [{id,type_code,name,location_id,description}] + total/next_offset. Not semantic.
  describe:
    description: "Show a single node's details (type, name, description, attrs, edges)."
  space:
    description: "SPACE node summary by id (appearance, occupants, devices, relations)"
    usage:
      line: "space -t | space -i <node_id>"
    section:
      title:
        "1": "Space description:"
        "2": "Space occupants:"
        "3": "Space devices:"
        "4": "Space relations:"
    table:
      header:
        id: "id"
        name: "name"
        direction: "direction"
        type_code: "type_code"
        status: "status"
        description: "description"
    s1:
      name: "name: {n}"
      local_name: "also known: {n}"
      tagline: "tagline: {n}"
      short_desc: "short: {n}"
      floor_name: "floor: {n}"
      exit: "exit {dir}: {name}"
    type_list:
      title: "SPACE type_code"
      empty: "(no SPACE types)"
      footer: "total: {n}"
    empty:
      row: "(none)"
    error:
      no_session: "requires an active DB session"
      not_found: "node not found or not a space"
      bad_i: "-i requires a node id"
      bad_id: "node id must be a positive integer"
      unknown_flag: "unknown flag: {token}"
    flags:
      bad_combo: "cannot combine -t with -i"
  primer:
    description: >-
      System primer — prefer `primer <section>` (e.g. primer ontology) to save tokens;
      bare `primer` returns the full nine-section document.
  agent_capabilities:
    description: "List agent capabilities for a service_id"
  agent_tools:
    description: >-
      List visible agents tools.
    title: "Agent Tools"
    header:
      service_id: "service_id"
      name: "name"
      status: "status"
      n_tools: "n"
      tools: "tools"
    footer:
      total: "(total={n})"
    empty: "No agents registered."
    tools_empty: "(none)"
    usage:
      add: "agent_tools add <service_id> <tool> [<tool>...]"
      del: "agent_tools del <service_id> <tool> [<tool>...]"
    summary:
      add_success: "add {sid} {tools} succeeded (allowlist updated)."
      add_mixed: "add {sid} {added} succeeded. Already in allowlist: {unchanged}."
      add_noop: "No change: {tools} already in the allowlist for {sid}."
      del_success: "del {sid} {tools} succeeded (allowlist updated)."
      del_mixed: "del {sid} {removed} succeeded. Not in allowlist: {unchanged}."
      del_noop: "No change: {tools} not in the allowlist for {sid}."
    error:
      no_session: "database session required"
      forbidden: "Permission denied for agent_tools {action}"
      unknown_tool: "unknown tool: {name}"
      misordered_add_del: >-
        Subcommand {second} must come first after agent_tools. Use: {expected}
        (This line was parsed as: query agent '{first}' only; '{second}' and the rest were ignored.)
  aico:
    description: "Talk to AICO"
  agent:
    description: >-
      Query Agent information: list / status / nlp
    list:
      empty: |-
        agent list: no active npc_agent nodes found.
        Expected: nodes with type_code=npc_agent, is_active=true
      header:
        service_id: "service_id"
        name: "name"
        status: "status"
        id: "agent_node_id"
      footer: "(total={n})"
      hint: "Example: agent status <service_id>"
    status_value:
      unavailable: "unavailable"
      idle: "idle"
      working: "working"
    error:
      no_session: "database session required"
  north:
    description: "Move north"
  south:
    description: "Move south"
  east:
    description: "Move east"
  west:
    description: "Move west"
  northeast:
    description: "Move northeast"
  northwest:
    description: "Move northwest"
  southeast:
    description: "Move southeast"
  southwest:
    description: "Move southwest"
  up:
    description: "Move up"
  down:
    description: "Move down"
  in:
    description: "Move in"
  out:
    description: "Move out"
