  room_short_description: 架空连桥，连接主楼与相邻街区与广场。
  room_description: '连桥架空于园区道路之上，两侧玻璃栏板外可见车行与人行动线。桥面铺设有导向带与应急疏散指示，

    晴天时光影在地面移动；这里承担高峰通勤的通过性空间，也是雨天不湿鞋的关键路径。

    '
  room_ambiance: 脚步与行李箱滚轮声交替，晚高峰略嘈杂。
