  room_short_description: 首层户外广场，活动与集散空间。
  room_description: '广场铺地划分通行区与停留区，中央可布置临展或市集。建筑立面在此退让形成灰空间，

    连桥与地面层出入口在此交汇；傍晚常有员工散步与驻留，是园区公共生活的开放舞台。

    '
