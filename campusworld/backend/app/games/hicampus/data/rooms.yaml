  uns: hicampus/F1/L01/GATE01
  room_short_description: 园区主入口门厅，接待与安检动线起点。
  room_description: '你站在 HiCampus 的主入口门厅。通透的玻璃与导向标识将人流引向闸机与前台；

    一侧是通往室外广场的出口，另一侧连向室内连桥与塔楼竖向交通。这里既是物理边界，

    也是数字孪生世界中「进入园区」语义的原点。

    '
  room_ambiance: 灯光明亮，背景音乐轻快，偶有访客咨询与闸机提示音。
