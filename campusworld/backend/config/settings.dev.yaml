# CampusWorld 开发环境配置
# 继承自 settings.yaml，覆盖开发环境特定配置

# 应用基础配置
app:
  debug: true
  environment: "development"

# 服务器配置
server:
  reload: true
  workers: 1

# 数据库配置
database:
  host: "localhost"
  port: 5433  # 开发环境使用不同端口
  name: "campusworld_dev"
  user: "campusworld_dev_user"
  password: "campusworld_dev_password"
  echo: false  # 开发环境显示SQL语句

# Redis配置
redis:
  host: "localhost"
  port: 6380  # 开发环境使用不同端口

# 日志配置
logging:
  level: "INFO"
  console_output: true
  file_output: true

# CORS配置
cors:
  allowed_origins:
    - "http://localhost:3000"
    - "http://127.0.0.1:3000"
    - "http://localhost:8080"
    - "http://localhost:5173"  # Vite dev server
    - "http://127.0.0.1:5173"

# 开发配置
development:
  enable_debug_toolbar: true
  enable_profiling: true
  mock_external_services: true
  seed_data: true
  # 允许 db.init_database reset（仍需 --i-understand）；也可用环境变量 CAMPUSWORLD_ALLOW_DB_RESET=true
  allow_db_reset: false

# 游戏引擎（开发）
# 默认不在进程启动时自动 load 已 install 的世界（如 hicampus），避免 PG/图种子未就绪或 graph_seed 耗时时主进程长时间阻塞。
# 需要开机即装世界时改为 true；或保持 false，在启动后执行 `world install` / `world reload`。
game_engine:
  load_installed_worlds_on_start: false

# 监控配置
monitoring:
  enable_metrics: false
  enable_tracing: false
