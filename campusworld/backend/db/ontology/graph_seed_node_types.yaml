          mutability: package_seed
        device_role:
          type: string
          value_kind: static
          mutability: package_seed
        status:
          type: string
          value_kind: dynamic_snapshot
          mutability: runtime
        av:
          type: object
          value_kind: static
          mutability: package_seed
          properties:
            resolution:
              type: string
            volume_pct:
              type:
              - integer
              - 'null'
