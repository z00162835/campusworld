    schema_definition:
      type: object
      title: building attributes (HiCampus P0)
      properties:
        building_code:
          type: string
          value_kind: static
          mutability: package_seed
        building_type:
          type: string
          value_kind: static
          mutability: package_seed
        floors_total:
          type: integer
          value_kind: static
          mutability: package_seed
        building_name:
          type: string
          value_kind: static
          mutability: package_seed
        uns:
          type: string
          value_kind: static
          mutability: package_seed
  building_floor:
    trait_class: SPACE
