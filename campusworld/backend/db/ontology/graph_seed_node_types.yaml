schema_revision: 3
node_types:
  network_access_point:
    trait_class: DEVICE
    trait_mask: 58
    tags:
    - graph_seed
    - device
    - hicampus
    schema_definition:
      description: 这是一台无线接入点。
      type: object
      title: network_access_point attributes
      properties:
        item_kind:
          type: string
          value_kind: static
          mutability: package_seed
        device_role:
          type: string
          value_kind: static
          mutability: package_seed
        status:
          type: string
          title: 设备状态
          value_kind: dynamic_snapshot
          mutability: runtime
        network:
          type: object
          title: 网络
          value_kind: static
          mutability: package_seed
          properties:
            mode:
              type: string
              title: 工作模式
            ssid:
              type: string
              title: SSID
            encryption:
              type: string
            bands:
              type: array
              items:
                type: string
        telemetry:
          type: object
          value_kind: dynamic_snapshot
          mutability: runtime
          properties:
            clients:
              type: integer
            rssi_dbm:
              type:
              - integer
              - 'null'
            uplink_mbps:
              type:
              - number
              - 'null'
  access_terminal:
    trait_class: DEVICE
    trait_mask: 126
    tags:
    - graph_seed
    - device
    - hicampus
    schema_definition:
      description: 这是一台门禁/闸机侧访问终端，用于凭证核验与通行控制。
      type: object
      title: access_terminal attributes
      properties:
        item_kind:
          type: string
          value_kind: static
          mutability: package_seed
        device_role:
          type: string
          value_kind: static
          mutability: package_seed
        access:
          type: object
          value_kind: static
          mutability: package_seed
          properties:
            mode:
              type: string
  lighting_fixture:
    trait_class: DEVICE
    trait_mask: 58
    tags:
    - graph_seed
    - device
    - hicampus
    schema_definition:
      description: 这是一路受控照明回路，用于空间照度与场景策略。
      type: object
      title: lighting_fixture attributes
      properties:
        item_kind:
          type: string
          value_kind: static
          mutability: package_seed
        device_role:
          type: string
          value_kind: static
          mutability: package_seed
        status:
          type: string
          value_kind: dynamic_snapshot
          mutability: runtime
        lighting:
          type: object
          value_kind: dynamic_snapshot
          mutability: runtime
          properties:
            brightness_pct:
              type:
              - integer
              - 'null'
            color_temp_k:
              type:
              - integer
              - 'null'
            scene:
              type:
              - string
              - 'null'
  av_display:
    trait_class: DEVICE
